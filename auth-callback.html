<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inaingiza — STORIES ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0f0f0e;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      flex-direction: column;
      gap: 24px;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid #2a2a2a;
      border-top-color: #9c2518;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .success { color: #42a781; }
    .error { color: #ef4444; }
    
    #message {
      font-size: 26px;
      font-weight: 700;
    }
    
    #status {
      color: #888;
      font-size: 15px;
      max-width: 400px;
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    
    .logo-text span { color: #9c2518; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2 id="message">Inakuthibitisha...</h2>
  <p id="status"></p>
  <div class="logo-text">STORIES <span>ZONE</span></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://fuyzusikxmkjmnhpdbof.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1eXp1c2lreG1ram1uaHBkYm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjM3MTcsImV4cCI6MjA5NTEzOTcxN30.QaPxUs4e_O64nBxYhByGVkYa4tPIB9OCAh89xuQGG7c';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuthCallback() {
      try {
        // Get session from URL
        const { data, error } = await supabase.auth.getSession();
        
        if (error) {
          console.error('Session error:', error);
          throw new Error(error.message);
        }
        
        if (data?.session) {
          // ✅ Success - User is logged in
          const messageEl = document.getElementById('message');
          messageEl.textContent = '✅ Umefanikiwa Kuingia!';
          messageEl.className = 'success';
          
          document.getElementById('status').textContent = 'Inakupeleka kwenye ukurasa wako...';
          
          // Store session in localStorage for backup
          localStorage.setItem('supabase_session', JSON.stringify(data.session));
          
          // Redirect to home page after 1.5 seconds
          setTimeout(() => {
            window.location.href = 'https://storieszone.site';
          }, 1500);
        } else {
          // ❌ No session found
          throw new Error('Hakuna session iliyopatikana. Tafadhali jaribu tena.');
        }
      } catch (err) {
        console.error('Auth callback error:', err);
        
        const messageEl = document.getElementById('message');
        messageEl.textContent = '❌ Hitilafu ya Kuingia';
        messageEl.className = 'error';
        
        document.getElementById('status').textContent = err.message || 'Tafadhali jaribu tena kuingia.';
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
          window.location.href = 'https://storieszone.site/login.html?error=google_auth_failed';
        }, 3000);
      }
    }

    // Run the auth handler
    handleAuthCallback();
  </script>
</body>
</html>
