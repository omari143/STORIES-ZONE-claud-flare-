<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>STORIES ZONE Interface | Smart Assistant</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: modern sans -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* main chat card */
        .chat-container {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        /* header with modern vibe */
        .chat-header {
            background: #ffffff;
            padding: 1rem 1.8rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-section i {
            font-size: 1.8rem;
            color: #3b82f6;
            background: #eef4ff;
            padding: 8px;
            border-radius: 16px;
        }

        .title-section h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2d3a5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .model-selector {
            background: #f8fafc;
            border-radius: 40px;
            padding: 0.35rem 0.9rem;
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-selector:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .clear-btn {
            background: #fff1f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #dc2626;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn:hover {
            background: #fee2e2;
            transform: scale(0.97);
        }

        /* chat messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background: #fefefe;
            scroll-behavior: smooth;
        }

        /* message bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease-out;
        }

        .user-message {
            align-self: flex-end;
        }

        .assistant-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.9rem 1.2rem;
            border-radius: 1.8rem;
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .user-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.4rem;
        }

        .assistant-bubble {
            background: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 0.4rem;
            border: 1px solid #e9edf2;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
            font-size: 0.7rem;
            color: #64748b;
            margin-left: 8px;
            margin-right: 8px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #5b6e8c;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 30px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* typing / loading indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            width: fit-content;
            margin-top: 4px;
            border: 1px solid #e2e8f0;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.5; }
            30% { transform: scale(1); opacity: 1; }
        }

        /* input area */
        .input-area {
            background: white;
            border-top: 1px solid #eef2f8;
            padding: 1rem 1.8rem 1.3rem;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f8fafc;
            border-radius: 2.2rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
            background: white;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            outline: none;
            max-height: 120px;
            padding: 6px 0;
            color: #0f172a;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        .send-btn {
            background: #3b82f6;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .send-btn:hover:not(:disabled) {
            background: #2563eb;
            transform: scale(1.02);
        }

        .send-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* small screens */
        @media (max-width: 650px) {
            .chat-container {
                height: 95vh;
                border-radius: 1.5rem;
            }
            .message {
                max-width: 92%;
            }
            .controls {
                gap: 8px;
            }
            .title-section h1 {
                font-size: 1.1rem;
            }
        }

        .copy-toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 1.5s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-15px); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="title-section">
            <i class="fas fa-comment-dots"></i>
            <h1>STORIES ZONE AI · Chat Studio</h1>
        </div>
        <div class="controls">
            <select id="modelSelect" class="model-selector">
                <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo (fast)</option>
                <option value="openai/gpt-4o-mini">GPT-4o mini (smart)</option>
                <option value="google/gemini-2.0-flash-exp:free">Gemini 2.0 Flash (free)</option>
                <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (free)</option>
                <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            </select>
            <button id="clearChatBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> Clear</button>
        </div>
    </div>

    <div id="messagesContainer" class="messages-area">
        <!-- dynamic messages injected -->
        <div class="assistant-message message">
            <div class="bubble assistant-bubble">
                👋 Hello! I'm your AI assistant. Ask me anything, and I'll respond with helpful answers. You can copy any of my responses using the copy button.
            </div>
            <div class="message-meta">
                <span><i class="far fa-clock"></i> just now</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Type your message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        </div>
        <button id="sendButton" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // CONFIGURATION & GLOBALS
    // --------------------------------------------------------------
    const API_KEY = "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";
    const OPENROUTER_ENDPOINT = "https://openrouter.ai/api/v1/chat/completions";
    
    // System prompt (customizable personality)
    const SYSTEM_PROMPT = "You are a helpful, friendly, and precise assistant. Provide clear, safe, and informative answers.";
    
    // Chat state
    let conversationHistory = [];   // stores { role: "user"|"assistant", content: string }
    let isLoading = false;
    let currentAbortController = null;
    
    // DOM elements
    const messagesContainer = document.getElementById("messagesContainer");
    const userInputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendButton");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const modelSelect = document.getElementById("modelSelect");
    
    // Helper: auto-resize textarea
    function autoResizeTextarea() {
        userInputEl.style.height = 'auto';
        userInputEl.style.height = Math.min(userInputEl.scrollHeight, 120) + 'px';
    }
    userInputEl.addEventListener('input', autoResizeTextarea);
    
    // Scroll to bottom of messages
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Show temporary toast message for copy
    function showCopyToast() {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.innerText = '📋 Copied to clipboard!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }
    
    // Copy text to clipboard
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            showCopyToast();
        } catch (err) {
            console.warn('Clipboard error:', err);
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showCopyToast();
        }
    }
    
    // Render full conversation from conversationHistory array
    function renderMessages() {
        if (!messagesContainer) return;
        // clear container but preserve eventual loading indicator? no, we replace all
        // But we need to show actual messages only. We remove everything and re-render based on history.
        // However the loading indicator is added separately, not stored in history.
        // We'll remove all children and rebuild messages + if there is a loading indicator currently displayed we preserve it? 
        // Simpler: we call render only when not loading and after updating history, loading indicator removed separately.
        // To avoid flicker we re-build from scratch.
        messagesContainer.innerHTML = '';
        
        if (conversationHistory.length === 0) {
            // show empty greeting state (optional welcome)
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'assistant-message message';
            welcomeDiv.innerHTML = `
                <div class="bubble assistant-bubble">
                    ✨ Hello! Start a conversation. I'm ready to help.
                </div>
                <div class="message-meta"><span><i class="far fa-comment"></i> start</span></div>
            `;
            messagesContainer.appendChild(welcomeDiv);
            scrollToBottom();
            return;
        }
        
        for (let i = 0; i < conversationHistory.length; i++) {
            const msg = conversationHistory[i];
            const isUser = msg.role === 'user';
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
            
            const bubbleClass = isUser ? 'user-bubble' : 'assistant-bubble';
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `bubble ${bubbleClass}`;
            bubbleDiv.innerText = msg.content;   // safe text
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            
            if (!isUser) {
                // copy button for assistant output
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-btn';
                copyButton.innerHTML = '<i class="far fa-copy"></i> Copy';
                copyButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(msg.content);
                });
                metaDiv.appendChild(copyButton);
                const timeSpan = document.createElement('span');
                timeSpan.innerHTML = '<i class="far fa-clock"></i> assistant';
                metaDiv.appendChild(timeSpan);
            } else {
                const timeSpan = document.createElement('span');
                timeSpan.innerHTML = '<i class="far fa-user"></i> you';
                metaDiv.appendChild(timeSpan);
            }
            
            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(metaDiv);
            messagesContainer.appendChild(messageDiv);
        }
        scrollToBottom();
    }
    
    // Add new message to history and re-render
    function addMessageToHistory(role, content) {
        conversationHistory.push({ role, content });
        renderMessages();
    }
    
    // Clear entire conversation
    function clearConversation() {
        // Abort any ongoing request to avoid inconsistencies
        if (currentAbortController) {
            currentAbortController.abort();
            currentAbortController = null;
        }
        isLoading = false;
        conversationHistory = [];
        renderMessages();   // will display welcome placeholder
        enableSendButton(true);
        // remove any custom loading elements if present
        removeLoadingIndicator();
    }
    
    // ---- LOADING INDICATOR (temporary element) ----
    let loadingElement = null;
    function showTypingIndicator() {
        removeLoadingIndicator(); // clean previous
        loadingElement = document.createElement('div');
        loadingElement.className = 'typing-indicator';
        loadingElement.id = 'typingLoader';
        loadingElement.innerHTML = `
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span style="font-size:0.8rem; margin-left:6px; color:#475569;">AI is thinking...</span>
        `;
        messagesContainer.appendChild(loadingElement);
        scrollToBottom();
    }
    
    function removeLoadingIndicator() {
        if (loadingElement && loadingElement.parentNode) {
            loadingElement.remove();
            loadingElement = null;
        }
        const existingLoader = document.getElementById('typingLoader');
        if (existingLoader) existingLoader.remove();
    }
    
    // Enable/disable UI during API call
    function enableSendButton(enabled) {
        sendBtn.disabled = !enabled;
        userInputEl.disabled = !enabled;
        if (enabled) {
            userInputEl.focus();
        }
    }
    
    // Send message to OpenRouter API
    async function sendMessageToAPI(userMessageText) {
        if (isLoading) return;
        
        // Add user message to history & re-render
        addMessageToHistory('user', userMessageText);
        userInputEl.value = '';
        autoResizeTextarea();
        
        isLoading = true;
        enableSendButton(false);
        
        // Show typing indicator
        showTypingIndicator();
        
        // Prepare API payload (system + full conversation)
        const selectedModel = modelSelect.value;
        const apiMessages = [
            { role: "system", content: SYSTEM_PROMPT },
            ...conversationHistory   // includes last user message + previous assistant interactions
        ];
        
        // Abort previous request if exists
        if (currentAbortController) {
            currentAbortController.abort();
        }
        currentAbortController = new AbortController();
        const signal = currentAbortController.signal;
        
        try {
            const response = await fetch(OPENROUTER_ENDPOINT, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`,
                    "HTTP-Referer": window.location.origin,
                    "X-Title": "AI Chat Interface"
                },
                body: JSON.stringify({
                    model: selectedModel,
                    messages: apiMessages,
                    temperature: 0.7,
                    max_tokens: 1200,
                    top_p: 0.95
                }),
                signal: signal
            });
            
            // Remove typing indicator before handling response
            removeLoadingIndicator();
            
            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.error?.message || errData.message || JSON.stringify(errData);
                } catch (e) {}
                throw new Error(`API Error (${response.status}): ${errorDetail}`);
            }
            
            const data = await response.json();
            const assistantReply = data?.choices?.[0]?.message?.content;
            
            if (!assistantReply) {
                throw new Error("Invalid response format: missing assistant content");
            }
            
            // Add assistant reply to conversation history
            addMessageToHistory('assistant', assistantReply.trim());
            
        } catch (err) {
            // AbortError means user cleared chat or cancelled, no need to show error
            if (err.name === 'AbortError') {
                console.log("Request aborted by user");
                removeLoadingIndicator();
                isLoading = false;
                enableSendButton(true);
                // do not add error message
                return;
            }
            console.error("API fetch error:", err);
            // Show error in chat as a temporary system message? But not stored to keep history clean.
            removeLoadingIndicator();
            // Show friendly error inside assistant-like temporary but not added to history?
            const errorMsgDiv = document.createElement('div');
            errorMsgDiv.className = 'assistant-message message';
            errorMsgDiv.style.animation = 'fadeSlideUp 0.2s';
            errorMsgDiv.innerHTML = `
                <div class="bubble assistant-bubble" style="background:#fee2e2; color:#b91c1c; border-left: 4px solid #ef4444;">
                    <i class="fas fa-exclamation-triangle"></i> <strong>Request failed</strong><br>${err.message || "Network or server error. Please check API key / model availability."}
                </div>
                <div class="message-meta"><span>⚠️ try again or clear context</span></div>
            `;
            messagesContainer.appendChild(errorMsgDiv);
            scrollToBottom();
            // auto remove after 6 seconds
            setTimeout(() => {
                if (errorMsgDiv.parentNode) errorMsgDiv.remove();
            }, 7000);
            isLoading = false;
            enableSendButton(true);
            currentAbortController = null;
            return;
        }
        
        // Done: reset loading state
        isLoading = false;
        enableSendButton(true);
        currentAbortController = null;
        scrollToBottom();
    }
    
    // Send handler (get user input)
    function handleSend() {
        if (isLoading) return;
        let rawMessage = userInputEl.value.trim();
        if (rawMessage === "") return;
        sendMessageToAPI(rawMessage);
    }
    
    // Event listeners
    sendBtn.addEventListener('click', handleSend);
    userInputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
    
    clearChatBtn.addEventListener('click', () => {
        if (isLoading && currentAbortController) {
            currentAbortController.abort();
            isLoading = false;
            enableSendButton(true);
            removeLoadingIndicator();
        }
        clearConversation();
    });
    
    // Optional: set initial focus & resize
    window.addEventListener('load', () => {
        userInputEl.focus();
        // initial history empty, welcome will be rendered by clearConversation style
        // but we already have a welcome message in HTML? Our renderMessages overwrites: so clearConversation triggers.
        // Ensure we set fresh state: start with empty history, so it shows the soft welcome.
        conversationHistory = [];
        renderMessages();   // Will show greeting based on empty history logic (welcome)
        // add small extra greeting from assistant? Already built-in render shows "start a conversation".
    });
    
    // additional safeguard: if any leftover loading indicator after abort, clean at intervals
    window.addEventListener('beforeunload', () => {
        if (currentAbortController) currentAbortController.abort();
    });
    
    // On model change, no need to reset history, just next messages use new model.
    // Also update any internal behavior.
    console.log("Chat interface ready — OpenRouter integrated");
</script>
</body>
</html>
