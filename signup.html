  <style>
/* ===== CSS Variables ===== */
:root {
  --bg: #0f0f0e;
  --bg-card: #141414;
  --bg-secondary: #1a1a1a;
  --text-primary: #e8e8e8;
  --text-secondary: #888888;
  --text-muted: #666666;
  --primary: #9c2518;
  --primary-hover: #b02d1f;
  --accent: #42a781;
  --accent-hover: #4dbd94;
  --border: #2a2a2a;
  --green: #25d366;
  --yellow: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-full: 9999px;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background-color: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
}

a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { max-width: 100%; display: block; }

/* ===== Header ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 15, 14, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--primary);
}

/* ===== Auth Layout ===== */
.auth-wrapper {
  min-height: calc(100vh - 60px - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  position: relative;
  overflow: hidden;
}

/* Background decorative blobs */
.auth-wrapper::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(156, 37, 24, 0.08) 0%, transparent 70%);
  pointer-events: none;
}

.auth-wrapper::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(66, 167, 129, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ===== Auth Box ===== */
.auth-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

@media (min-width: 480px) {
  .auth-box { padding: 40px 36px; }
}

/* ===== Auth Header ===== */
.auth-header {
  text-align: center;
  margin-bottom: 28px;
}

.auth-logo-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.auth-logo-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(156, 37, 24, 0.35);
}

.auth-logo-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.auth-logo-name {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.auth-logo-name span {
  color: var(--primary);
}

.auth-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.auth-subtitle {
  font-size: 14px;
  color: var(--text-muted);
}

/* ===== Forms ===== */
.auth-form { display: none; }
.auth-form.active { display: block; }

.form-group { margin-bottom: 16px; }

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 17px;
  height: 17px;
  color: var(--text-muted);
  pointer-events: none;
}

.form-group input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-group input::placeholder { color: var(--text-muted); }

.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(156, 37, 24, 0.12);
}

/* Password toggle */
.toggle-pass {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  padding: 4px;
  transition: color 0.2s ease;
}
.toggle-pass:hover { color: var(--text-primary); }
.toggle-pass svg { width: 17px; height: 17px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  border-radius: var(--radius-full);
  transition: all 0.2s ease;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: var(--primary);
  color: white;
  width: 100%;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:active { transform: scale(0.98); }

/* ===== Divider ===== */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ===== Social Buttons ===== */
.social-login { display: flex; flex-direction: column; gap: 10px; }

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
}

.social-btn:hover {
  background: var(--bg);
  border-color: rgba(255,255,255,0.15);
}

.social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ===== Terms note ===== */
.terms-note {
  margin-top: 20px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}

.terms-note a {
  color: var(--primary);
  font-weight: 500;
}
.terms-note a:hover { text-decoration: underline; }

/* ===== Switch link ===== */
.switch-link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-muted);
}

.switch-link a {
  color: var(--primary);
  font-weight: 600;
}
.switch-link a:hover { text-decoration: underline; }

/* ===== Password strength ===== */
.strength-bar {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}

.strength-segment {
  height: 3px;
  flex: 1;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.3s ease;
}

.strength-label {
  font-size: 11px;
  margin-top: 4px;
  font-weight: 600;
  height: 14px;
  transition: color 0.3s ease;
}

/* ===== Toast Message ===== */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 12px 20px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  z-index: 1000;
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

.toast.success {
  border-color: var(--accent);
  color: var(--accent);
}

.toast.error {
  border-color: #ef4444;
  color: #ef4444;
}

/* ===== Bottom Navigation ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(15, 15, 14, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 16px;
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  transition: color 0.2s ease;
  border-radius: var(--radius-sm);
}

.nav-item svg { width: 20px; height: 20px; }
.nav-item:hover { color: var(--text-primary); }
.nav-item.active { color: var(--primary); }

/* ===== Loading Spinner ===== */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .auth-box {
    padding: 24px 20px;
  }
  .auth-logo-name {
    font-size: 20px;
  }
  .auth-title {
    font-size: 20px;
  }
}

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM Elements
    const registerForm = document.getElementById('register-form');

    const emailInput = document.getElementById('register-email');
    const passwordInput = document.getElementById('register-password');
    const confirmInput = document.getElementById('register-confirm');
    const confirmMsg = document.getElementById('confirmMsg');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    // Password strength elements
    const segs = [
      document.getElementById('seg1'),
      document.getElementById('seg2'),
      document.getElementById('seg3'),
      document.getElementById('seg4')
    ];
    const strengthLabel = document.getElementById('strengthLabel');

    // Helper: Show toast message
    function showToast(message, type = 'info') {
      toast.textContent = message;
      toast.className = 'toast';
      if (type === 'success') toast.classList.add('success');
      if (type === 'error') toast.classList.add('error');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Helper: Get password strength (0-4)
    function getPasswordStrength(pw) {
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    const strengthColors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
    const strengthTexts = ['', 'Dhaifu sana', 'Dhaifu', 'Nzuri', 'Imara'];

    // Password strength listener
    passwordInput.addEventListener('input', () => {
      const score = passwordInput.value.length === 0 ? 0 : getPasswordStrength(passwordInput.value);
      segs.forEach((seg, i) => {
        seg.style.background = i < score ? strengthColors[score] : 'var(--border)';
      });
      strengthLabel.textContent = passwordInput.value.length === 0 ? '' : strengthTexts[score];
      strengthLabel.style.color = strengthColors[score] || 'var(--text-muted)';
      
      if (confirmInput.value) {
        const match = confirmInput.value === passwordInput.value;
        confirmMsg.textContent = match ? '✓ Nywila zinafanana' : '✗ Nywila hazilingani';
        confirmMsg.style.color = match ? 'var(--accent)' : '#ef4444';
      }
    });

    // Confirm password listener
    confirmInput.addEventListener('input', () => {
      if (!confirmInput.value) {
        confirmMsg.textContent = '';
        return;
      }
      const match = confirmInput.value === passwordInput.value;
      confirmMsg.textContent = match ? '✓ Nywila zinafanana' : '✗ Nywila hazilingani';
      confirmMsg.style.color = match ? 'var(--accent)' : '#ef4444';
    });

    // Toggle password visibility
    document.querySelectorAll('.toggle-pass').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        const icon = btn.querySelector('.eye-icon');
        if (icon) icon.style.opacity = isPass ? '0.4' : '1';
      });
    });

    // Register with Email
    async function registerUser(email, password, fullName) {
      try {
        const { data: authData, error: signUpError } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });

        if (signUpError) {
          if (signUpError.message.includes('User already registered')) {
            throw new Error('Barua pepe tayari imesajiliwa. Tafadhali ingia.');
          }
          throw new Error(signUpError.message);
        }

        if (!authData.user) {
          throw new Error('Hajakamilika. Tafadhali jaribu tena.');
        }

        return { success: true, user: authData.user };
      } catch (err) {
        console.error('Registration error:', err);
        return { success: false, error: err.message };
      }
    }

    // Form submission
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = nameInput.value.trim();
      if (!fullName) {
        showToast('Tafadhali ingiza jina lako kamili', 'error');
        nameInput.focus();
        return;
      }
      
      const email = emailInput.value.trim();
      if (!email) {
        showToast('Tafadhali ingiza barua pepe yako', 'error');
        emailInput.focus();
        return;
      }
      
      const password = passwordInput.value;
      if (!password) {
        showToast('Tafadhali tengeneza nywila', 'error');
        passwordInput.focus();
        return;
      }
      
      if (password.length < 6) {
        showToast('Nywila lazima iwe angalau herufi 6', 'error');
        passwordInput.focus();
        return;
      }
      
      if (password !== confirmInput.value) {
        showToast('Nywila hazilingani. Tafadhali hakikisha zinafanana', 'error');
        confirmInput.focus();
        return;
      }
      
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<div class="spinner"></div><span> Inasajili...</span>';
      submitBtn.disabled = true;
      
      try {
        const result = await registerUser(email, password, fullName);
        
        if (result.success) {
          showToast('Akaunti imeundwa kikamilifu! Angalia barua pepe yako kwa uthibitisho.', 'success');
          
          registerForm.reset();
          confirmMsg.textContent = '';
          strengthLabel.textContent = '';
          segs.forEach(seg => seg.style.background = 'var(--border)');
          
          submitBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px;"><polyline points="20 6 9 17 4 12"/></svg> Akaunti Imeundwa!';
          submitBtn.style.background = 'var(--accent)';
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showToast(result.error || 'Imeshindwa kuunda akaunti. Jaribu tena.', 'error');
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
          submitBtn.style.background = 'var(--primary)';
        }
      } catch (err) {
        console.error('Form submission error:', err);
        showToast('Hitilafu ya mtandao. Jaribu tena.', 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        submitBtn.style.background = 'var(--primary)';
      }
    });

    // Google Signup
    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/index.html' }
        });
        if (error) throw error;
      } catch (error) {
        showToast(error.message || 'Imeshindwa kujisajili kwa Google. Jaribu tena.', 'error');
      }
    });

    // Facebook Signup
    document.getElementById('facebookBtn').addEventListener('click', async () => {
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'facebook',
          options: { redirectTo: window.location.origin + '/index.html' }
        });
        if (error) throw error;
      } catch (error) {
        showToast(error.message || 'Imeshindwa kujisajili kwa Facebook. Jaribu tena.', 'error');
      }
    });
  </script>

</body>
